<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolej cup 2026 | Občerstvení a vyžití</title>
    <style>
        :root {
            --oranzova: #ff9d2d;
            --bila: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            color: var(--bila);
            background-image: url('https://images.pexels.com/photos/28374813/pexels-photo-28374813.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(145deg, rgba(2, 14, 44, 0.84), rgba(6, 22, 58, 0.76));
            z-index: -1;
        }

        .container {
            max-width: 920px;
            margin: 0 auto;
            padding: 24px 20px 40px;
        }

        .top-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            justify-content: center;
        }

        .nav-btn {
            text-decoration: none;
            color: #fff;
            background: rgba(30, 63, 122, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.45);
            border-radius: 10px;
            padding: 10px 14px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .theme-toggle {
            border: 1px solid rgba(255, 255, 255, 0.45);
            background: rgba(30, 63, 122, 0.9);
            color: #ffffff;
            border-radius: 10px;
            padding: 10px 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
        }

        .header-top {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 12px;
        }

        .card {
            margin-top: 18px;
            background: rgba(2, 13, 36, 0.84);
            border: 1px solid rgba(255, 255, 255, 0.24);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.38);
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 6vw, 3.2rem);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #e9f2ff;
            margin: 8px 0 0;
        }

        ul {
            margin: 16px 0 0;
            padding-left: 22px;
            line-height: 1.7;
        }

        [data-theme="light"] body {
            color: #13233f;
        }

        [data-theme="light"] body::before {
            background: linear-gradient(145deg, rgba(235, 243, 255, 0.82), rgba(223, 236, 255, 0.74));
        }

        [data-theme="light"] .card {
            background: rgba(247, 251, 255, 0.86);
            border-color: rgba(17, 41, 86, 0.2);
            box-shadow: 0 10px 25px rgba(10, 24, 50, 0.16);
        }

        [data-theme="light"] .subtitle {
            color: #203a63;
        }

        [data-theme="light"] .nav-btn,
        [data-theme="light"] .theme-toggle {
            background: rgba(33, 88, 168, 0.95);
            color: #ffffff;
        }

        .site-footer {
            margin-top: 28px;
            background: transparent;
            border-top: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 0;
            padding: 16px 0 6px;
            line-height: 1.6;
        }

        .site-footer h2 {
            margin: 0 0 8px;
            border-left: 4px solid var(--oranzova);
            padding-left: 10px;
            font-size: 1.1rem;
        }

        .site-footer p {
            margin: 4px 0;
        }

        .site-footer a {
            color: #ffd8a3;
            font-weight: 700;
        }

        .site-footer a:hover {
            color: #ffffff;
        }

        [data-theme="light"] .site-footer a {
            color: #0f3d91;
        }

        [data-theme="light"] .site-footer {
            background: transparent;
            border-top-color: rgba(17, 41, 86, 0.3);
            color: #13233f;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="top-nav" aria-label="Navigace stránky">
            <a class="nav-btn" href="index.html">⬅️ Zpět</a>
            <a class="nav-btn" href="index.html">🏠 Domů</a>
            <a class="nav-btn" href="harmonogram.html">🕒 Harmonogram</a>
        </nav>

        <section class="card">
            <div class="header-top">
                <button class="theme-toggle" type="button" data-theme-toggle>☀️ Denní režim</button>
            </div>
            <h1>Občerstvení a vyžití</h1>
            <p class="subtitle">Průběžně doplníme kompletní nabídku občerstvení a doprovodného programu.</p>
            <ul>
                <li>Jídlo: doplníme</li>
                <li>Nápoje: doplníme</li>
                <li>Zábava a aktivity: doplníme</li>
            </ul>
        </section>

        <footer class="site-footer">
            <h2>Kontaktní údaje</h2>
            <p>E-mail: <a href="mailto:michaldvorak4@gmail.com">michaldvorak4@gmail.com</a></p>
            <p>Telefon: <a href="tel:+420737738496">+420 737 738 496</a></p>
            <p>Michal Dvořák</p>
        </footer>
    </div>
    <script>
        const themeButtons = document.querySelectorAll('[data-theme-toggle]');
        const themeStorageKey = 'kolej-cup-theme';

        function getInitialTheme() {
            const storedTheme = localStorage.getItem(themeStorageKey);
            if (storedTheme === 'light' || storedTheme === 'dark') {
                return storedTheme;
            }
            return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            const label = theme === 'light' ? '🌙 Noční režim' : '☀️ Denní režim';
            themeButtons.forEach((button) => {
                button.textContent = label;
                button.setAttribute('aria-label', label);
            });
        }

        applyTheme(getInitialTheme());

        themeButtons.forEach((button) => {
            button.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
                const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
                applyTheme(nextTheme);
                localStorage.setItem(themeStorageKey, nextTheme);
            });
        });
    </script>
</body>
</html>
