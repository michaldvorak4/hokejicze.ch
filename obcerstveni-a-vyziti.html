<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolej cup 2026 | Občerstvení a vyžití</title>
    <style>
        :root {
            --oranzova: #ff9d2d;
            --bila: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            color: var(--bila);
            background-image: url('https://images.pexels.com/photos/28374813/pexels-photo-28374813.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(145deg, rgba(2, 14, 44, 0.84), rgba(6, 22, 58, 0.76));
            z-index: -1;
        }

        .container {
            max-width: 920px;
            margin: 0 auto;
            padding: 24px 20px 40px;
        }

        .top-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            justify-content: center;
        }

        .nav-btn {
            text-decoration: none;
            color: #fff;
            background: rgba(30, 63, 122, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.45);
            border-radius: 10px;
            padding: 10px 14px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .card {
            margin-top: 18px;
            background: rgba(2, 13, 36, 0.84);
            border: 1px solid rgba(255, 255, 255, 0.24);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.38);
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 6vw, 3.2rem);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #e9f2ff;
            margin: 8px 0 0;
        }

        ul {
            margin: 16px 0 0;
            padding-left: 22px;
            line-height: 1.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="top-nav" aria-label="Navigace stránky">
            <a class="nav-btn" href="index.html">⬅️ Zpět</a>
            <a class="nav-btn" href="index.html">🏠 Domů</a>
            <a class="nav-btn" href="harmonogram.html">🕒 Harmonogram</a>
        </nav>

        <section class="card">
            <h1>Občerstvení a vyžití</h1>
            <p class="subtitle">Průběžně doplníme kompletní nabídku občerstvení a doprovodného programu.</p>
            <ul>
                <li>Jídlo: doplníme</li>
                <li>Nápoje: doplníme</li>
                <li>Zábava a aktivity: doplníme</li>
            </ul>
        </section>
    </div>
</body>
</html>
