<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolej cup 2026 | Občerstvení a vyžití</title>
    <style>
        :root {
            --oranzova: #ff9d2d;
            --bila: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            color: var(--bila);
            background-image: url('https://images.pexels.com/photos/28374813/pexels-photo-28374813.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(145deg, rgba(2, 14, 44, 0.84), rgba(6, 22, 58, 0.76));
            z-index: -1;
        }

        .container {
            max-width: 920px;
            margin: 0 auto;
            padding: 24px 20px 40px;
        }

        .top-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            justify-content: center;
        }

        .nav-btn {
            text-decoration: none;
            color: #fff;
            background: rgba(30, 63, 122, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.45);
            border-radius: 10px;
            padding: 10px 14px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .theme-toggle {
            border: 1px solid rgba(255, 255, 255, 0.45);
            background: rgba(30, 63, 122, 0.9);
            color: #ffffff;
            border-radius: 10px;
            padding: 10px 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
        }

        .header-top {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 12px;
        }

        .card {
            margin-top: 18px;
            background: rgba(2, 13, 36, 0.84);
            border: 1px solid rgba(255, 255, 255, 0.24);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.38);
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 6vw, 3.2rem);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #e9f2ff;
            margin: 8px 0 0;
        }

        ul {
            margin: 16px 0 0;
            padding-left: 22px;
            line-height: 1.7;
        }

        .contact-strip {
            margin-top: 6px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 8px;
            text-align: center;
            font-size: 1.05rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.28);
            border-radius: 10px;
            padding: 10px 14px;
        }

        .contact-item {
            font-weight: 700;
            color: #f3f8ff;
        }

        .contact-item a {
            color: #ffd8a3;
        }

        .contact-separator {
            color: rgba(255, 255, 255, 0.75);
            font-weight: 700;
        }

        [data-theme="light"] body {
            color: #13233f;
        }

        [data-theme="light"] body::before {
            background: linear-gradient(145deg, rgba(178, 196, 226, 0.72), rgba(155, 181, 220, 0.66));
        }

        [data-theme="light"] .card {
            background: rgba(227, 236, 250, 0.9);
            border-color: rgba(17, 41, 86, 0.2);
            box-shadow: 0 10px 25px rgba(10, 24, 50, 0.16);
        }

        [data-theme="light"] .subtitle {
            color: #203a63;
        }

        [data-theme="light"] .nav-btn,
        [data-theme="light"] .theme-toggle {
            background: rgba(33, 88, 168, 0.95);
            color: #ffffff;
        }

        [data-theme="light"] .contact-strip {
            background: rgba(233, 241, 253, 0.94);
            border-color: rgba(17, 41, 86, 0.24);
        }

        .contact-social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #1877f2;
            color: #ffffff !important;
            border: 1px solid rgba(255, 255, 255, 0.55);
            transition: transform 0.15s ease, filter 0.15s ease;
        }

        .contact-social-link:hover {
            transform: translateY(-1px);
            filter: brightness(1.08);
        }

        .contact-social-link svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        [data-theme="light"] .contact-item {
            color: #102a4d;
        }

        [data-theme="light"] .contact-item a {
            color: #0b3f9a;
        }

        [data-theme="light"] .contact-separator {
            color: rgba(16, 42, 84, 0.75);
        }

        .site-footer {
            margin-top: 28px;
            background: transparent;
            border-top: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 0;
            padding: 16px 0 6px;
            line-height: 1.6;
        }

        [data-theme="light"] .site-footer {
            background: transparent;
            border-top-color: rgba(17, 41, 86, 0.3);
            color: #13233f;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="top-nav" aria-label="Navigace stránky">
            <a class="nav-btn" href="index.html">⬅️ Zpět</a>
            <a class="nav-btn" href="index.html">🏠 Domů</a>
            <a class="nav-btn" href="harmonogram.html">🕒 Harmonogram</a>
        </nav>

        <section class="card">
            <div class="header-top">
                <button class="theme-toggle" type="button" data-theme-toggle>☀️ Denní režim</button>
            </div>
            <h1>Občerstvení a vyžití</h1>
            <p class="subtitle">Průběžně doplníme kompletní nabídku občerstvení a doprovodného programu.</p>
            <ul>
                <li>Jídlo: doplníme</li>
                <li>Nápoje: doplníme</li>
                <li>Zábava a aktivity: doplníme</li>
            </ul>
        </section>

        <footer class="site-footer">
            <div class="contact-strip" aria-label="Kontaktní údaje pořadatele">
                <span class="contact-item">Michal Dvořák</span>
                <span class="contact-separator" aria-hidden="true">/</span>
                <span class="contact-item">E-mail: <a href="mailto:michaldvorak4@gmail.com">michaldvorak4@gmail.com</a></span>
                <span class="contact-separator" aria-hidden="true">/</span>
                <span class="contact-item">Telefon: <a href="tel:+420737738496">+420 737 738 496</a></span>
                <span class="contact-separator" aria-hidden="true">/</span>
                <a class="contact-social-link" href="https://www.facebook.com/events/" target="_blank" rel="noopener noreferrer" aria-label="Facebook událost turnaje" title="Facebook událost turnaje">
                    <svg viewBox="0 0 320 512" aria-hidden="true" focusable="false">
                        <path d="M279.14 288l14.22-92.66h-88.91v-60.13c0-25.35 12.42-50.06 52.24-50.06h40.42V6.26S260.43 0 225.36 0c-73.22 0-121.08 44.38-121.08 124.72v70.62H22.89V288h81.39v224h100.17V288z"></path>
                    </svg>
                </a>
            </div>
        </footer>
    </div>
    <script>
        const themeButtons = document.querySelectorAll('[data-theme-toggle]');
        const themeStorageKey = 'kolej-cup-theme';

        function getInitialTheme() {
            const storedTheme = localStorage.getItem(themeStorageKey);
            if (storedTheme === 'light' || storedTheme === 'dark') {
                return storedTheme;
            }
            return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            const label = theme === 'light' ? '🌙 Noční režim' : '☀️ Denní režim';
            themeButtons.forEach((button) => {
                button.textContent = label;
                button.setAttribute('aria-label', label);
            });
        }

        applyTheme(getInitialTheme());

        themeButtons.forEach((button) => {
            button.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
                const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
                applyTheme(nextTheme);
                localStorage.setItem(themeStorageKey, nextTheme);
            });
        });
    </script>
</body>
</html>
