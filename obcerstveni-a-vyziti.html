<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolej cup 2026 | Občerstvení a vyžití</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        :root {
            --oranzova: #ff9d2d;
            --bila: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', 'Segoe UI', 'Arial', sans-serif;
            color: var(--bila);
            background-image: url('https://images.pexels.com/photos/28374813/pexels-photo-28374813.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(145deg, rgba(2, 14, 44, 0.84), rgba(6, 22, 58, 0.76));
            z-index: -1;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 34px 24px 56px;
        }

        .top-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
            justify-content: center;
            align-items: center;
        }

        .nav-logo {
            width: 40px;
            height: 40px;
            object-fit: contain;
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.3));
            opacity: 0.95;
        }

        .nav-btn {
            text-decoration: none;
            color: #fff;
            background: linear-gradient(135deg, #1f4b98, #12336b);
            border: 1px solid rgba(255, 255, 255, 0.45);
            border-radius: 14px;
            padding: 10px 14px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .theme-toggle {
            border: 1px solid rgba(255, 255, 255, 0.45);
            background: linear-gradient(135deg, #1f4b98, #12336b);
            color: #ffffff;
            border-radius: 14px;
            padding: 10px 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        body::after {
            content: "";
            position: fixed;
            width: min(50vw, 560px);
            aspect-ratio: 1;
            right: -14vw;
            top: -18vh;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(97, 154, 255, 0.3), rgba(97, 154, 255, 0));
            filter: blur(14px);
            z-index: -1;
            pointer-events: none;
        }

        .nav-btn:hover,
        .theme-toggle:hover {
            transform: translateY(-2px);
            filter: brightness(1.08);
        }

        .card {
            margin-top: 18px;
            background: rgba(2, 13, 36, 0.84);
            border: 1px solid rgba(255, 255, 255, 0.24);
            border-radius: 22px;
            padding: 30px;
            box-shadow: 0 18px 38px rgba(0, 0, 0, 0.35);
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 6vw, 3.2rem);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #e9f2ff;
            margin: 8px 0 0;
        }

        ul {
            margin: 16px 0 0;
            padding-left: 22px;
            line-height: 1.7;
        }

        .shorts-player {
            margin-top: 22px;
        }

        .shorts-player h2 {
            margin: 0 0 12px;
            border-left: 4px solid var(--oranzova);
            padding-left: 10px;
            font-size: 1.15rem;
        }

        .shorts-frame-wrap {
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.28);
            background: rgba(0, 0, 0, 0.28);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
        }

        .shorts-frame {
            width: 100%;
            aspect-ratio: 9 / 16;
            max-height: 640px;
            border: 0;
            display: block;
        }

        [data-theme="light"] .shorts-frame-wrap {
            border-color: rgba(17, 41, 86, 0.24);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 22px rgba(10, 24, 50, 0.18);
        }

        .contact-strip {
            margin-top: 6px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
            text-align: center;
            font-size: 1.05rem;
            background: rgba(2, 13, 36, 0.58);
            border: 1px solid rgba(255, 255, 255, 0.28);
            border-radius: 14px;
            padding: 10px 14px;
        }

        .contact-details {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .contact-item {
            font-weight: 700;
            color: #f3f8ff;
        }

        .contact-item a {
            color: #ffd8a3;
        }

        .contact-separator {
            color: rgba(255, 255, 255, 0.75);
            font-weight: 700;
        }

        .contact-socials {
            margin-top: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 14px;
        }

        [data-theme="light"] body {
            color: #13233f;
        }

        [data-theme="light"] body::before {
            background: linear-gradient(145deg, rgba(178, 196, 226, 0.72), rgba(155, 181, 220, 0.66));
        }

        [data-theme="light"] .card {
            background: rgba(227, 236, 250, 0.9);
            border-color: rgba(17, 41, 86, 0.2);
            box-shadow: 0 10px 25px rgba(10, 24, 50, 0.16);
        }

        [data-theme="light"] .subtitle {
            color: #203a63;
        }

        [data-theme="light"] .nav-logo {
            filter: drop-shadow(0 3px 8px rgba(10, 24, 50, 0.28));
        }
        [data-theme="light"] .nav-btn,
        [data-theme="light"] .theme-toggle {
            background: rgba(33, 88, 168, 0.95);
            color: #ffffff;
        }

        [data-theme="light"] .contact-strip {
            background: rgba(233, 241, 253, 0.94);
            border-color: rgba(17, 41, 86, 0.24);
        }

        .contact-social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: rgba(31, 67, 130, 0.78);
            color: #ffffff !important;
            border: 1px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.24);
            transition: transform 0.15s ease, filter 0.15s ease, background-color 0.15s ease;
        }

        .contact-social-link:hover {
            transform: translateY(-1px);
            filter: brightness(1.08);
            background: rgba(43, 90, 170, 0.82);
        }

        .contact-social-link svg {
            width: 32px;
            height: 32px;
            fill: currentColor;
        }

        [data-theme="light"] .contact-item {
            color: #102a4d;
        }

        [data-theme="light"] .contact-item a {
            color: #0b3f9a;
        }

        [data-theme="light"] .contact-separator {
            color: rgba(16, 42, 84, 0.75);
        }

        [data-theme="light"] .contact-social-link {
            background: rgba(33, 88, 168, 0.9);
            border-color: rgba(255, 255, 255, 0.48);
        }

        .site-footer {
            margin-top: 28px;
            padding: 0;
            line-height: 1.6;
        }

        [data-theme="light"] .site-footer {
            color: #13233f;
        }

        @media (max-width: 700px) {
            .container { padding: 18px 14px 36px; }
            .card { padding: 20px 14px; border-radius: 16px; }
            .top-nav { gap: 8px; }
            .nav-logo { width: 34px; height: 34px; }
            .nav-btn, .theme-toggle {
                padding: 9px 11px;
                font-size: 0.92rem;
                border-radius: 11px;
                gap: 6px;
            }
            .contact-socials { gap: 10px; }
            .contact-social-link {
                width: 48px;
                height: 48px;
                border-radius: 12px;
            }
            .contact-social-link svg {
                width: 26px;
                height: 26px;
            }
        }

    </style>
</head>
<body>
    <div class="container">
        <nav class="top-nav" aria-label="Navigace stránky">
            <img class="nav-logo" src="Logo s průhledným pozadím - malé na web.svg" alt="Logo Kolej cup 2026" aria-hidden="true">
            <a class="nav-btn" href="index.html">🏠 Domů</a>
            <a class="nav-btn" href="harmonogram.html">🕒 Harmonogram</a>
            <button class="theme-toggle" type="button" data-theme-toggle>☀️ Denní režim</button>
        </nav>

        <section class="card">
            <h1>Občerstvení a vyžití</h1>
            <p class="subtitle">Průběžně doplníme kompletní nabídku občerstvení a doprovodného programu.</p>
            <ul>
                <li>Jídlo: doplníme</li>
                <li>Nápoje: doplníme</li>
                <li>Zábava a aktivity: doplníme</li>
            </ul>
        </section>

        <footer class="site-footer">
            <div class="contact-strip" aria-label="Kontaktní údaje pořadatele">
                <div class="contact-details">
                    <span class="contact-item">Michal Dvořák</span>
                    <span class="contact-separator" aria-hidden="true">/</span>
                    <span class="contact-item">E-mail: <a href="mailto:michaldvorak4@gmail.com">michaldvorak4@gmail.com</a></span>
                    <span class="contact-separator" aria-hidden="true">/</span>
                    <span class="contact-item">Telefon: <a href="tel:+420737738496">+420 737 738 496</a></span>
                </div>
            </div>
            <div class="contact-socials" aria-label="Sociální sítě">
                <a class="contact-social-link" href="https://www.facebook.com/events/" target="_blank" rel="noopener noreferrer" aria-label="Facebook událost turnaje" title="Facebook událost turnaje">
                    <svg viewBox="0 0 320 512" aria-hidden="true" focusable="false">
                        <path d="M279.14 288l14.22-92.66h-88.91v-60.13c0-25.35 12.42-50.06 52.24-50.06h40.42V6.26S260.43 0 225.36 0c-73.22 0-121.08 44.38-121.08 124.72v70.62H22.89V288h81.39v224h100.17V288z"></path>
                    </svg>
                </a>
            </div>
        </footer>
    </div>
    <script>
        const themeButtons = document.querySelectorAll('[data-theme-toggle]');
        const themeStorageKey = 'kolej-cup-theme';

        function getInitialTheme() {
            const storedTheme = localStorage.getItem(themeStorageKey);
            if (storedTheme === 'light' || storedTheme === 'dark') {
                return storedTheme;
            }
            return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            const label = theme === 'light' ? '🌙 Noční režim' : '☀️ Denní režim';
            themeButtons.forEach((button) => {
                button.textContent = label;
                button.setAttribute('aria-label', label);
            });
        }

        applyTheme(getInitialTheme());

        themeButtons.forEach((button) => {
            button.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
                const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
                applyTheme(nextTheme);
                localStorage.setItem(themeStorageKey, nextTheme);
            });
        });
    </script>
</body>
</html>
